{% extends "base.html" %}

{% block title %}Report-12 {% endblock %}

{% block head %}
<style>

    :root{
        --rp-blue:#2F6FED;
        --rp-blue-dark:#1D4FB8;
        --rp-green:#16A34A;
        --rp-green-dark:#0F7C38;
        --rp-ink:#1F2937;
        --rp-muted:#6B7280;
        --rp-border:#DDE3EA;
        --rp-bg:#F6F8FA;
        --rp-card:#FFFFFF;
        --rp-highlight:#FDF3D0;
        --rp-section-bg:#EEF2F7;
    }

    .rp02-wrap *{ box-sizing:border-box; }
    .rp02-wrap{ font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif; }

    /* ---------- Module header ---------- */
    .module-header{
        display:flex;
        align-items:center;
        gap:12px;
        margin-bottom:20px;
        padding-bottom:16px;
        border-bottom:1px solid var(--rp-border);
    }
    .module-header h2{ margin:0; font-size:22px; font-weight:700; color:var(--rp-ink); }
    .module-header .rp-badge{
        background:var(--rp-blue); color:#fff; padding:4px 12px; border-radius:20px;
        font-size:12px; font-weight:700; letter-spacing:0.4px;
    }
    .module-header .rp-back{ margin-left:auto; font-size:13px; font-weight:500; color:var(--rp-blue); text-decoration:none; }
    .module-header .rp-back:hover{ text-decoration:underline; }

    /* ---------- Sheet tabs ---------- */
    .rp02-tabs{
        display:flex;
        gap:8px;
        margin-bottom:14px;
    }
    .rp02-tab{
        font-size:13px;
        font-weight:600;
        padding:9px 18px;
        border-radius:8px;
        border:1px solid var(--rp-border);
        background:var(--rp-card);
        color:var(--rp-muted);
        cursor:pointer;
    }
    .rp02-tab.active{
        background:var(--rp-blue);
        border-color:var(--rp-blue);
        color:#fff;
    }

    /* ---------- Toolbar ---------- */
    .jjltpl-toolbar{
        display:flex; align-items:center; gap:10px; flex-wrap:wrap;
        background:var(--rp-card); border:1px solid var(--rp-border); border-radius:10px;
        padding:14px 16px; margin-bottom:14px;
    }
    .jjltpl-toolbar label{
        font-size:12px; font-weight:600; color:var(--rp-muted);
        text-transform:uppercase; letter-spacing:0.4px; margin-right:2px;
    }
    .jjltpl-toolbar select{
        font-size:13px; font-weight:500; color:var(--rp-ink); background:var(--rp-bg);
        border:1px solid var(--rp-border); border-radius:6px; padding:7px 10px;
        cursor:pointer; outline:none;
    }
    .jjltpl-toolbar select:focus{ border-color:var(--rp-blue); }
    .jjltpl-toolbar button{
        font-size:13px; font-weight:600; border-radius:6px; padding:8px 16px;
        border:none; cursor:pointer; color:#fff;
    }
    .jjltpl-toolbar button:active{ transform:translateY(1px); }
    .jjltpl-load-btn{ background:var(--rp-blue); }
    .jjltpl-load-btn:hover{ background:var(--rp-blue-dark); }
    .jjltpl-export-btn{ background:var(--rp-green); margin-left:auto; }
    .jjltpl-export-btn:hover{ background:var(--rp-green-dark); }

    #reportStatus{ font-size:13px; color:var(--rp-muted); min-height:18px; margin-bottom:14px; }

    /* ---------- Report card ---------- */
    .jjltpl-table-wrap{
        background:var(--rp-card); border:1px solid var(--rp-border); border-radius:10px;
        overflow:hidden;
    }
    .report-header{ padding:18px 20px 14px; border-bottom:1px solid var(--rp-border); background:var(--rp-bg); }
    .report-info{ width:100%; border-collapse:collapse; margin-bottom:4px; }
    .report-info td{ padding:3px 6px; border:none; font-size:14px; color:var(--rp-ink); }
    .report-info .label{ text-align:left; font-weight:600; color:var(--rp-muted); white-space:nowrap; width:1%; }
    .report-info td:last-child{ text-align:left; font-weight:700; color:var(--rp-ink); padding-left:10px; }
    .unit-text{
        text-align:right; font-size:12px; font-weight:600; letter-spacing:0.4px;
        color:var(--rp-muted); text-transform:uppercase;
    }

    /* ---------- Table ---------- */
    .table-scroll{ overflow-x:auto; }
    .traffic-report-table{ width:100%; border-collapse:collapse; min-width:820px; }
    .traffic-report-table th, .traffic-report-table td{ border:1px solid var(--rp-border); }
    .traffic-report-table thead th{
        background:var(--rp-bg); color:var(--rp-ink); font-weight:700; font-size:13px;
        text-align:center; padding:8px 12px;
    }
    .traffic-report-table tbody td{
        padding:7px 12px; font-size:13.5px; color:var(--rp-ink);
    }
    .traffic-report-table td:first-child{ text-align:left; color:var(--rp-ink); font-size:13px; }
    .traffic-report-table td.num, .traffic-report-table th.num{
        text-align:right; font-weight:500; font-variant-numeric:tabular-nums;
    }
    .section-row td{
        background:var(--rp-section-bg);
        font-weight:700;
        color:var(--rp-ink);
    }
    .highlight-cell{ background:var(--rp-highlight); font-weight:600; }

</style>
{% endblock %}

{% block content %}
<div class="rp02-wrap">

    <div class="module-header">
        <h2>Report-12 </h2>
        <span class="rp-badge">RP01</span>
        <a href="/module/RP01/" class="rp-back">&larr; Back to Reports</a>
    </div>


    <div class="jjltpl-toolbar">
        <label for="yearSelect">Year</label>
        <select id="yearSelect" onchange="onYearChange()"></select>

        <label for="monthSelect">Month</label>
        <select id="monthSelect"></select>

        <button class="jjltpl-load-btn" onclick="loadReport2()">Load</button>
        <button class="jjltpl-export-btn" onclick="exportReport2()">Export to Excel</button>
    </div>

    <div id="reportStatus"></div>

    <div class="jjltpl-table-wrap">

        <div class="report-header">
            <table class="report-info">
                <tr>
                    <td class="label">Port / Terminal :</td>
                    <td id="portName">JJLTPL</td>
                </tr>
                <tr>
                    <td class="label">Year :</td>
                    <td id="financialYear"></td>
                </tr>
                <tr>
                    <td class="label">Period : For the month of</td>
                    <td id="reportMonth"></td>
                </tr>
            </table>
            <div class="unit-text">('000,000 Tonnes / TEUs)</div>
        </div>

        <div class="table-scroll">
            <table class="traffic-report-table">
                <thead id="tableHead">
                    <!-- built dynamically -->
                </thead>
                <tbody id="commodityBody">
                    <!-- built dynamically -->
                </tbody>
            </table>
        </div>

        <div id="notesBlock" style="padding:14px 20px; font-size:12.5px; color:var(--rp-muted); border-top:1px solid var(--rp-border);"></div>

    </div>

</div>
{% endblock %}

{% block scripts %}
<script>
let META = { years: [], months: {}, port_name: "JJLTPL", sheets: {} };
let CURRENT_SHEET = "two_leg";

function formatNumber(val) {
    if (val === null || val === undefined || val === "" || val === 0)
        return "";
    return Number(val).toFixed(3);
}

function populateYearSelect() {
    const yearSelect = document.getElementById("yearSelect");
    yearSelect.innerHTML = META.years.map(y => `<option value="${y}">${y}</option>`).join("");

    const today = new Date();
    const year = today.getFullYear();
    const month = today.getMonth() + 1;
    const currentFY = month >= 4
        ? `${year}-${String(year + 1).slice(-2)}`
        : `${year - 1}-${String(year).slice(-2)}`;

    if (META.years.includes(currentFY)) {
        yearSelect.value = currentFY;
    } else if (META.years.length) {
        yearSelect.value = META.years[META.years.length - 1];
    }
}

function populateMonthSelect() {
    const monthSelect = document.getElementById("monthSelect");
    const year = document.getElementById("yearSelect").value;
    const months = META.months[year] || [];

    monthSelect.innerHTML = months.map(m => `<option value="${m.idx}">${m.label}</option>`).join("");

    const today = new Date();
    const monthNames = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
    const currentLabel = `${monthNames[today.getMonth()]}-${String(today.getFullYear()).slice(-2)}`;
    const currentMonth = months.find(m => m.label === currentLabel);

    if (currentMonth) {
        monthSelect.value = currentMonth.idx;
    } else if (months.length) {
        monthSelect.value = months[months.length - 1].idx;
    }
}

function onYearChange() {
    populateMonthSelect();
}

function onSheetChange(sheet) {
    CURRENT_SHEET = sheet;
    document.querySelectorAll(".rp02-tab").forEach(el => {
        el.classList.toggle("active", el.dataset.sheet === sheet);
    });
    loadReport2();
}

function loadMetaThenReport() {
    const status = document.getElementById("reportStatus");
    status.textContent = "Loading...";

    fetch(`/api/module/RP01/report12/meta`)
        .then(r => r.json().then(j => ({ ok: r.ok, j })))
        .then(({ ok, j }) => {
            if (!ok) {
                status.textContent = j.error || "Failed to load year/month options.";
                console.error("meta error:", j.error);
                return;
            }
            META = j;
            document.getElementById("portName").textContent = META.port_name || "JJLTPL";
            populateYearSelect();
            populateMonthSelect();
            status.textContent = "";
            loadReport2();
        })
        .catch(err => {
            status.textContent = "Failed to load year/month options.";
            console.error(err);
        });
}

function buildHead(groups, directions) {
    const thead = document.getElementById("tableHead");
    const groupRow = document.createElement("tr");
    const commodityTh = document.createElement("th");
    commodityTh.rowSpan = 2;
    commodityTh.textContent = "Commodity";
    commodityTh.style.width = "26%";
    groupRow.appendChild(commodityTh);

    groups.forEach(g => {
        const th = document.createElement("th");
        th.colSpan = directions.length;
        th.textContent = g;
        groupRow.appendChild(th);
    });

    const subRow = document.createElement("tr");
    groups.forEach(g => {
        directions.forEach(d => {
            const th = document.createElement("th");
            th.className = "num";
            th.textContent = d;
            subRow.appendChild(th);
        });
    });

    thead.innerHTML = "";
    thead.appendChild(groupRow);
    thead.appendChild(subRow);
}

function buildBody(rows, groups, directions) {
    const tbody = document.getElementById("commodityBody");
    tbody.innerHTML = rows.map(r => {
        if (r.header) {
            return `<tr class="section-row"><td colspan="${1 + groups.length * directions.length}">${r.label}</td></tr>`;
        }
        const cells = groups.map(g => directions.map(d => {
            const v = (r.cells && r.cells[`${g}||${d}`]) || 0;
            const cls = "num" + (v ? " highlight-cell" : "");
            return `<td class="${cls}">${formatNumber(v)}</td>`;
        }).join("")).join("");
        return `<tr><td>${r.label}</td>${cells}</tr>`;
    }).join("");
}

function loadReport2() {
    const fin_year = document.getElementById("yearSelect").value;
    const month_idx = document.getElementById("monthSelect").value;
    const status = document.getElementById("reportStatus");

    if (!fin_year || month_idx === "") {
        status.textContent = "Select a year and month first.";
        return;
    }
    status.textContent = "";

    fetch(`/api/module/RP01/report12/report?sheet=${CURRENT_SHEET}&fin_year=${fin_year}&month_idx=${month_idx}`)
        .then(r => r.json().then(j => ({ ok: r.ok, j })))
        .then(({ ok, j }) => {
            if (!ok) {
                status.textContent = j.error || "Failed to load report.";
                return;
            }

            document.getElementById("portName").textContent = j.port_name || "JJLTPL";
            document.getElementById("financialYear").textContent = j.fin_year || "";
            document.getElementById("reportMonth").textContent = j.month_label || "";

            buildHead(j.groups, j.directions);
            buildBody(j.rows, j.groups, j.directions);

            document.getElementById("notesBlock").innerHTML =
                "<strong>Note :</strong><br>" + (j.notes || []).map(n => n).join("<br>");
        })
        .catch(err => {
            status.textContent = "Failed to load report.";
            console.error(err);
        });
}

function exportReport2() {
    const fin_year = document.getElementById("yearSelect").value;
    const month_idx = document.getElementById("monthSelect").value;

    if (!fin_year || month_idx === "") {
        document.getElementById("reportStatus").textContent = "Select a year and month first.";
        return;
    }

    window.location.href =
        `/api/module/RP01/report12/export?sheet=${CURRENT_SHEET}&fin_year=${fin_year}&month_idx=${month_idx}`;
}

loadMetaThenReport();
</script>
{% endblock %}
