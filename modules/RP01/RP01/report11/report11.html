{% extends "base.html" %}

{% block title %}Report-11 {% endblock %}

{% block head %}
<style>

    :root{
        --rp-blue:#2F6FED;
        --rp-blue-dark:#1D4FB8;
        --rp-green:#16A34A;
        --rp-green-dark:#0F7C38;
        --rp-ink:#1F2937;
        --rp-muted:#6B7280;
        --rp-border:#DDE3EA;
        --rp-bg:#F6F8FA;
        --rp-card:#FFFFFF;
        --rp-highlight:#FDF3D0;
        --rp-section-bg:#EEF2F7;
    }

    .rp02-wrap *{ box-sizing:border-box; }
    .rp02-wrap{ font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif; }

    /* ---------- Module header ---------- */
    .module-header{
        display:flex;
        align-items:center;
        gap:12px;
        margin-bottom:20px;
        padding-bottom:16px;
        border-bottom:1px solid var(--rp-border);
    }
    .module-header h2{ margin:0; font-size:22px; font-weight:700; color:var(--rp-ink); }
    .module-header .rp-badge{
        background:var(--rp-blue); color:#fff; padding:4px 12px; border-radius:20px;
        font-size:12px; font-weight:700; letter-spacing:0.4px;
    }
    .module-header .rp-back{ margin-left:auto; font-size:13px; font-weight:500; color:var(--rp-blue); text-decoration:none; }
    .module-header .rp-back:hover{ text-decoration:underline; }

    /* ---------- Sheet tabs (kept for parity, currently unused - single sheet report) ---------- */
    .rp02-tabs{
        display:flex;
        gap:8px;
        margin-bottom:14px;
    }
    .rp02-tab{
        font-size:13px;
        font-weight:600;
        padding:9px 18px;
        border-radius:8px;
        border:1px solid var(--rp-border);
        background:var(--rp-card);
        color:var(--rp-muted);
        cursor:pointer;
    }
    .rp02-tab.active{
        background:var(--rp-blue);
        border-color:var(--rp-blue);
        color:#fff;
    }

    /* ---------- Toolbar ---------- */
    .jjltpl-toolbar{
        display:flex; align-items:center; gap:10px; flex-wrap:wrap;
        background:var(--rp-card); border:1px solid var(--rp-border); border-radius:10px;
        padding:14px 16px; margin-bottom:14px;
    }
    .jjltpl-toolbar label{
        font-size:12px; font-weight:600; color:var(--rp-muted);
        text-transform:uppercase; letter-spacing:0.4px; margin-right:2px;
    }
    .jjltpl-toolbar select{
        font-size:13px; font-weight:500; color:var(--rp-ink); background:var(--rp-bg);
        border:1px solid var(--rp-border); border-radius:6px; padding:7px 10px;
        cursor:pointer; outline:none;
    }
    .jjltpl-toolbar select:focus{ border-color:var(--rp-blue); }
    .jjltpl-toolbar button{
        font-size:13px; font-weight:600; border-radius:6px; padding:8px 16px;
        border:none; cursor:pointer; color:#fff;
    }
    .jjltpl-toolbar button:active{ transform:translateY(1px); }
    .jjltpl-load-btn{ background:var(--rp-blue); }
    .jjltpl-load-btn:hover{ background:var(--rp-blue-dark); }
    .jjltpl-export-btn{ background:var(--rp-green); margin-left:auto; }
    .jjltpl-export-btn:hover{ background:var(--rp-green-dark); }

    #reportStatus{ font-size:13px; color:var(--rp-muted); min-height:18px; margin-bottom:14px; }

    /* ---------- Report card ---------- */
    .jjltpl-table-wrap{
        background:var(--rp-card); border:1px solid var(--rp-border); border-radius:10px;
        overflow:hidden;
    }
    .report-header{ padding:18px 20px 14px; border-bottom:1px solid var(--rp-border); background:var(--rp-bg); }
    .report-info{ width:100%; border-collapse:collapse; margin-bottom:4px; }
    .report-info td{ padding:3px 6px; border:none; font-size:14px; color:var(--rp-ink); }
    .report-info .label{ text-align:left; font-weight:600; color:var(--rp-muted); white-space:nowrap; width:1%; }
    .report-info td:last-child{ text-align:left; font-weight:700; color:var(--rp-ink); padding-left:10px; }
    .unit-text{
        text-align:right; font-size:12px; font-weight:600; letter-spacing:0.4px;
        color:var(--rp-muted); text-transform:uppercase;
    }

    /* ---------- Table ---------- */
    .table-scroll{ overflow-x:auto; }
    .traffic-report-table{ width:100%; border-collapse:collapse; min-width:1400px; }
    .traffic-report-table th, .traffic-report-table td{ border:1px solid var(--rp-border); }
    .traffic-report-table thead th{
        background:var(--rp-bg); color:var(--rp-ink); font-weight:700; font-size:12.5px;
        text-align:center; padding:8px 10px; white-space:nowrap;
    }
    .traffic-report-table tbody td{
        padding:7px 10px; font-size:13px; color:var(--rp-ink);
    }
    .traffic-report-table td.label{ text-align:left; color:var(--rp-ink); font-size:13px; min-width:280px; white-space:normal; }
    .traffic-report-table td.unit{ text-align:center; color:var(--rp-muted); font-size:12px; white-space:nowrap; }
    .traffic-report-table td.num, .traffic-report-table th.num{
        text-align:right; font-weight:500; font-variant-numeric:tabular-nums; white-space:nowrap;
    }
    .section-row td{
        background:var(--rp-section-bg);
        font-weight:700;
        color:var(--rp-ink);
    }
    .subsection-row td{
        background:#F9FAFC;
        font-weight:600;
        color:var(--rp-muted);
        font-size:12px;
        text-transform:uppercase;
        letter-spacing:0.4px;
    }
    .highlight-cell{ background:var(--rp-highlight); font-weight:600; }

</style>
{% endblock %}

{% block content %}
<div class="rp02-wrap">

    <div class="module-header">
        <h2>Report-11 </h2>
        <span class="rp-badge">RP01</span>
        <a href="/module/RP01/" class="rp-back">&larr; Back to Reports</a>
    </div>


    <div class="jjltpl-toolbar">
        <label for="yearSelect">Financial Year</label>
        <select id="yearSelect"></select>

        <button class="jjltpl-load-btn" onclick="loadReport11()">Load</button>
        <button class="jjltpl-export-btn" onclick="exportReport11()">Export to Excel</button>
    </div>

    <div id="reportStatus"></div>

    <div class="jjltpl-table-wrap">

        <div class="report-header">
            <table class="report-info">
                <tr>
                    <td class="label">Port / Terminal :</td>
                    <td id="portName">JJLTPL</td>
                </tr>
                <tr>
                    <td class="label">Financial Year :</td>
                    <td id="financialYear"></td>
                </tr>
            </table>
            <div class="unit-text">Bulk Terminal Performance Report</div>
        </div>

        <div class="table-scroll">
            <table class="traffic-report-table">
                <thead id="tableHead">
                    <!-- built dynamically -->
                </thead>
                <tbody id="reportBody">
                    <!-- built dynamically -->
                </tbody>
            </table>
        </div>

    </div>

</div>
{% endblock %}

{% block scripts %}
<script>
let META11 = { years: [], port_name: "JJLTPL" };

const SECTION_A_ROWS = [
    ["Vessel Discharge (Including Restow)", "TEUs"],
    ["Vessel Load (Including Restow)", "TEUs"],
    ["Tonnage", "Tonnes"],
    ["Vessels Sailed", "Nos"],
    ["Pre_berthing Waiting Time-on Port a/c (Total)", "Hrs"],
    ["Pre_berthing Waiting Time-on Non-Port a/c (Total)", "Hrs."],
    ["Total Berth Stay of all vessels (For Berth Productivity)", "Hrs"],
    ["Total Crane deplyoed hours (For Crane Productivity)", "Hrs"],
    ["Vessel Inward movement (Total)", "Hrs"],
    ["Vessel Outward movement (Total)", "Hrs"],
    ["Idle time at working berth on Port A/c.", "Hrs."],
    ["Idle time at working berth on Non-Port A/c.", "Hrs."],
    ["Idle time at Non-working berth on Port A/c.", "Hrs."],
    ["Idle time at Non-working berth on Non-Port A/c.", "Hrs."],
    ["Shifting Time", "Hrs."],
    ["Total No. of Moves for calculating  Berth / Crane Productivity", "Moves"],
    ["Total No. of TEUs for calculating  Crane Productivity", "TEUs"],
    ["Rail Load", "TEUs"],
    ["Rail Discharge", "TEUs"],
    ["No. of Rakes handled", "Nos"],
    ["Days in a month", "Nos"],
    ["No. of berths for % berth occupancy", "Nos"],
    ["Dry Bulk traffic - Import", "Tonnes"],
    ["Dry Bulk traffic - Export", "Tonnes"],
    ["Break Bulk traffic - Import", "Tonnes"],
    ["Break Bulk traffic - Export", "Tonnes"],
    ["Liquid - Import", "Tonnes"],
    ["Liquid - Export", "Tonnes"],
];

const SECTION_B_ROWS = [
    ["Vessels Sailed", "Nos."],
    ["Total Traffic Throughputs (TEUs)", "TEUs"],
    ["Total traffic throughputs (Tons)", "Tons"],
    ["Parcel Size", "TEUs"],
    ["Avg. Pre-berthing Waiting Time-Total", "Days"],
    ["Avg. Pre-berthing Waiting Time-Port A/c.", "Days"],
    ["Avg. Pre-berthing Waiting Time-Non-Port A/c.", "Days"],
    ["Avg. Berth stay", "Days"],
    ["Avg. Turn around time - Total", "Days"],
    ["Avg. Turn around time - Port A/c.", "Days"],
    ["Avg. Turn around time - Non- Port A/c.", "Days"],
    ["Avg. Turn around time - Pilot Boarding to De-boarding-Total", "Days"],
    ["Avg. Turn around time - Pilot Boarding to De-boarding-Port A/c.", "Days"],
    ["Berth Occupancy", "%"],
    ["Idle time", "%"],
    ["Gross Berth Productivity", "Moves /Hrs"],
    ["Ship Output per Day (Tonnes)", "Tonnes"],
];

const SECTION_C_ROWS = [
    ["Avg. Pre-berthing Waiting Time-Total", "Hrs."],
    ["Avg. Pre-berthing Waiting Time-Port A/c.", "Hrs."],
    ["Avg. Pre-berthing Waiting Time-Non-Port A/c.", "Hrs."],
    ["Avg. Berth stay", "Hrs."],
    ["Avg. Turn around time - Total", "Hrs."],
    ["Avg. Turn around time - Port A/c.", "Hrs."],
    ["Avg. Turn around time - Non- Port A/c.", "Hrs."],
    ["Avg. Turn around time - Pilot Boarding to De-boarding-Total", "Hrs."],
    ["Avg. Turn around time - Pilot Boarding to De-boarding-Port A/c.", "Hrs."],
    ["Avg. TRT for 1000 tonnes (Days)", "Days"],
    ["Avg. TRT for 1000 tonnes (Hrs)", "Hrs."],
];

function formatNumber11(val, unit = "") {
    if (val === null || val === undefined || val === "")
        return "";

    const num = Number(val);

    if (unit.toLowerCase().includes("nos")) {
        return num.toFixed(0);
    }

    // Percentage rows
    if (unit.trim() === "%") {
        return (num * 100).toFixed(2) + "%";
    }

    return num.toFixed(2);
}

function populateYearSelect11() {
    const yearSelect = document.getElementById("yearSelect");
    yearSelect.innerHTML = META11.years.map(y => `<option value="${y}">${y}</option>`).join("");

    const today = new Date();
    const year = today.getFullYear();
    const month = today.getMonth() + 1;
    const currentFY = month >= 4
        ? `${year}-${String(year + 1).slice(-2)}`
        : `${year - 1}-${String(year).slice(-2)}`;

    if (META11.years.includes(currentFY)) {
        yearSelect.value = currentFY;
    } else if (META11.years.length) {
        yearSelect.value = META11.years[META11.years.length - 1];
    }
}

function loadMetaThenReport11() {
    const status = document.getElementById("reportStatus");
    status.textContent = "Loading...";

    fetch(`/api/module/RP01/report11/meta`)
        .then(r => r.json().then(j => ({ ok: r.ok, j })))
        .then(({ ok, j }) => {
            if (!ok) {
                status.textContent = j.error || "Failed to load year options.";
                console.error("meta error:", j.error);
                return;
            }
            META11 = j;
            document.getElementById("portName").textContent = META11.port_name || "JJLTPL";
            populateYearSelect11();
            status.textContent = "";
            loadReport11();
        })
        .catch(err => {
            status.textContent = "Failed to load year options.";
            console.error(err);
        });
}

function buildHead11(months) {
    const thead = document.getElementById("tableHead");
    const row = document.createElement("tr");

    const labelTh = document.createElement("th");
    labelTh.textContent = "Particulars";
    labelTh.className = "label";
    row.appendChild(labelTh);

    const unitTh = document.createElement("th");
    unitTh.textContent = "Units";
    row.appendChild(unitTh);

    months.forEach(m => {
        const th = document.createElement("th");
        th.className = "num";
        th.textContent = m;
        row.appendChild(th);
    });

    const totalTh = document.createElement("th");
    totalTh.className = "num";
    totalTh.textContent = "FY Total";
    row.appendChild(totalTh);

    thead.innerHTML = "";
    thead.appendChild(row);
}

function buildSectionRows11(rows, monthData, sectionLabel, colspan) {
    let html = `<tr class="section-row"><td colspan="${colspan}">${sectionLabel}</td></tr>`;
    rows.forEach(([key, unit]) => {
        html += `<tr><td class="label">${key}</td><td class="unit">${unit}</td>`;
        let total = 0;
        let hasVal = false;
        monthData.forEach(m => {
            const v = m[key];
            if (typeof v === "number") { total += v; hasVal = true; }
            const cls = "num" + (v ? " highlight-cell" : "");
            html += `<td class="${cls}">${formatNumber11(v, unit)}</td>`;
        });
        html += `<td class="num highlight-cell">${hasVal ? formatNumber11(total, unit) : ""}</td>`;
        html += `</tr>`;
    });
    return html;
}

function loadReport11() {
    const fin_year = document.getElementById("yearSelect").value;
    const status = document.getElementById("reportStatus");

    if (!fin_year) {
        status.textContent = "Select a financial year first.";
        return;
    }
    status.textContent = "";

    fetch(`/api/module/RP01/report11/report?fin_year=${fin_year}`)
        .then(r => r.json().then(j => ({ ok: r.ok, j })))
        .then(({ ok, j }) => {
            if (!ok) {
                status.textContent = j.error || "Failed to load report.";
                return;
            }

            document.getElementById("portName").textContent = j.port_name || "JJLTPL";
            document.getElementById("financialYear").textContent = j.fin_year || "";

            const colspan = 3 + j.months.length;
            buildHead11(j.months);

            let body = "";
            body += buildSectionRows11(SECTION_A_ROWS, j.section_a, "A) TERMINAL PERFORMANCE (To be filled by Terminals)", colspan);
            body += buildSectionRows11(SECTION_B_ROWS, j.section_b, "B) PRODUCTIVITY PARAMETERS (Derived - Days)", colspan);
            body += buildSectionRows11(SECTION_C_ROWS, j.section_c, "C) PRODUCTIVITY PARAMETERS (Derived - Hrs)", colspan);

            document.getElementById("reportBody").innerHTML = body;
        })
        .catch(err => {
            status.textContent = "Failed to load report.";
            console.error(err);
        });
}

function exportReport11() {
    const fin_year = document.getElementById("yearSelect").value;

    if (!fin_year) {
        document.getElementById("reportStatus").textContent = "Select a financial year first.";
        return;
    }

    window.location.href = `/api/module/RP01/report11/export?fin_year=${fin_year}`;
}

loadMetaThenReport11();
</script>
{% endblock %}
