{% extends "base.html" %}

{% block title %}Expected Vessels - PORTMAN{% endblock %}

{% block content %}
<div class="module-header">
    <h2>Expected Vessels</h2>
    <span class="module-code">EV01</span>
</div>

<div class="toolbar">
    {% if permissions.can_add %}<button class="btn btn-add" onclick="openAddModal()">+ Add Row</button>{% endif %}
    {% if permissions.can_delete %}<button class="btn btn-delete" onclick="deleteSelected()">Delete Selected</button>{% endif %}
    <div class="row-info">Rows: <span id="rowCount">0</span> / <span id="totalCount">0</span></div>
</div>

<!-- Add/Edit Modal -->
<div id="evModal" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);z-index:1000;overflow-y:auto;">
    <div style="background:#fff;margin:40px auto;padding:28px 32px;border-radius:10px;max-width:820px;position:relative;">
        <button onclick="closeModal()" style="position:absolute;top:12px;right:16px;background:none;border:none;font-size:20px;cursor:pointer;">&times;</button>
        <h3 id="modalTitle" style="margin:0 0 20px;">Add Expected Vessel</h3>
        <form id="evForm" onsubmit="submitForm(event)">
            <input type="hidden" id="fId" name="id">
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;">
                <div>
                    <label>Terminal</label>
                    <input type="text" id="fTerminal" name="terminal_name" style="width:100%;padding:6px 8px;border:1px solid #ccc;border-radius:4px;">
                </div>
                <div>
                    <label>Vessel Name</label>
                    <input type="text" id="fVesselName" name="vessel_name" style="width:100%;padding:6px 8px;border:1px solid #ccc;border-radius:4px;">
                </div>
                <div>
                    <label>VIA No.</label>
                    <input type="text" id="fViaNumber" name="via_number" style="width:100%;padding:6px 8px;border:1px solid #ccc;border-radius:4px;">
                </div>
                <div>
                    <label>LOA</label>
                    <input type="number" step="0.01" id="fLoa" name="loa" style="width:100%;padding:6px 8px;border:1px solid #ccc;border-radius:4px;">
                </div>
                <div>
                    <label>Draft (DFT)</label>
                    <input type="number" step="0.01" id="fDraft" name="draft" style="width:100%;padding:6px 8px;border:1px solid #ccc;border-radius:4px;">
                </div>
                <div>
                    <label>AGT / TNK / CONS</label>
                    <input type="text" id="fAgent" name="agent_tank_consignee" style="width:100%;padding:6px 8px;border:1px solid #ccc;border-radius:4px;">
                </div>
                <div>
                    <label>Cargo</label>
                    <input type="text" id="fCargo" name="cargo_name" style="width:100%;padding:6px 8px;border:1px solid #ccc;border-radius:4px;">
                </div>
                <div>
                    <label>MLA</label>
                    <input type="text" id="fMla" name="mla" style="width:100%;padding:6px 8px;border:1px solid #ccc;border-radius:4px;">
                </div>
                <div>
                    <label>Quantity</label>
                    <input type="number" step="0.001" id="fQty" name="quantity" style="width:100%;padding:6px 8px;border:1px solid #ccc;border-radius:4px;">
                </div>
                <div>
                    <label>DDP</label>
                    <input type="date" id="fDdp" name="ddp" style="width:100%;padding:6px 8px;border:1px solid #ccc;border-radius:4px;">
                </div>
                <div>
                    <label>DOP</label>
                    <input type="date" id="fDop" name="dop" style="width:100%;padding:6px 8px;border:1px solid #ccc;border-radius:4px;">
                </div>
                <div>
                    <label>ETA</label>
                    <input type="datetime-local" id="fEta" name="eta" style="width:100%;padding:6px 8px;border:1px solid #ccc;border-radius:4px;">
                </div>
                <div>
                    <label>ATA</label>
                    <input type="datetime-local" id="fAta" name="ata" style="width:100%;padding:6px 8px;border:1px solid #ccc;border-radius:4px;">
                </div>
                <div>
                    <label>LPC</label>
                    <input type="datetime-local" id="fLpc" name="lpc" style="width:100%;padding:6px 8px;border:1px solid #ccc;border-radius:4px;">
                </div>
                <div>
                    <label>DOC</label>
                    <input type="datetime-local" id="fDoc" name="doc" style="width:100%;padding:6px 8px;border:1px solid #ccc;border-radius:4px;">
                </div>
                <div>
                    <label>NOR</label>
                    <input type="datetime-local" id="fNor" name="nor" style="width:100%;padding:6px 8px;border:1px solid #ccc;border-radius:4px;">
                </div>
                <div>
                    <label>Berth</label>
                    <input type="text" id="fBerth" name="berth_name" style="width:100%;padding:6px 8px;border:1px solid #ccc;border-radius:4px;">
                </div>
            </div>
            <div style="margin-top:20px;text-align:right;">
                <button type="button" onclick="closeModal()" style="padding:8px 20px;margin-right:10px;border:1px solid #ccc;border-radius:4px;cursor:pointer;background:#f5f5f5;">Cancel</button>
                <button type="submit" class="btn btn-save" style="padding:8px 20px;">Save</button>
            </div>
        </form>
    </div>
</div>

<div id="table"></div>
{% endblock %}

{% block scripts %}
<script>
    addToRecent('EV01', 'Expected Vessels');
    let table;

    const permissions = {
        can_edit:   {{ permissions.can_edit|default(0) }},
        can_add:    {{ permissions.can_add|default(0) }},
        can_delete: {{ permissions.can_delete|default(0) }}
    };

    function fmtDatetime(cell) {
        const v = cell.getValue();
        if (!v) return '';
        const d = new Date(v);
        if (isNaN(d)) return v;
        return d.toLocaleString('en-IN', {day:'2-digit', month:'2-digit', year:'numeric', hour:'2-digit', minute:'2-digit', hour12:false});
    }

    function fmtDate(cell) {
        const v = cell.getValue();
        if (!v) return '';
        const d = new Date(v);
        if (isNaN(d)) return v;
        return d.toLocaleDateString('en-IN', {day:'2-digit', month:'2-digit', year:'numeric'});
    }

    function actionFormatter(cell) {
        const row = cell.getRow().getData();
        if (row.doc_status === 'Moved to VCN') {
            return `<span style="color:#888;font-size:12px;">Moved to VCN (${row.vcn_id || ''})</span>`;
        }
        let html = '';
        if (permissions.can_edit) {
            html += `<button onclick="editRow(${row.id})" style="margin-right:4px;padding:2px 8px;font-size:12px;cursor:pointer;border:1px solid #4a90e2;color:#4a90e2;background:#fff;border-radius:3px;">Edit</button>`;
        }
        if (row.doc_status === 'Pending') {
            html += `<button onclick="moveToVcn(${row.id})" style="padding:2px 8px;font-size:12px;cursor:pointer;border:1px solid #27ae60;color:#27ae60;background:#fff;border-radius:3px;">Move to VCN</button>`;
        }
        return html;
    }

    function initTable() {
        table = new Tabulator("#table", {
            height: "calc(100vh - 160px)",
            layout: "fitColumns",
            columns: [
                {formatter: "rowSelection", titleFormatter: "rowSelection", hozAlign: "center", headerSort: false, width: 40},
                {title: "No",            field: "id",                   width: 55, headerSort: true},
                {title: "Terminal",      field: "terminal_name",        widthGrow: 1, headerFilter: "input"},
                {title: "Vessel Name",   field: "vessel_name",          widthGrow: 2, headerFilter: "input"},
                {title: "VIA No.",       field: "via_number",           width: 90},
                {title: "LOA",           field: "loa",                  width: 70},
                {title: "DFT",           field: "draft",                width: 65},
                {title: "AGT/TNK/CONS",  field: "agent_tank_consignee", widthGrow: 1.5, headerFilter: "input"},
                {title: "Cargo",         field: "cargo_name",           widthGrow: 1, headerFilter: "input"},
                {title: "MLA",           field: "mla",                  width: 80},
                {title: "Qty",           field: "quantity",             width: 80},
                {title: "DDP",           field: "ddp",                  width: 100, formatter: fmtDate},
                {title: "DOP",           field: "dop",                  width: 100, formatter: fmtDate},
                {title: "ETA",           field: "eta",                  width: 130, formatter: fmtDatetime},
                {title: "ATA",           field: "ata",                  width: 130, formatter: fmtDatetime},
                {title: "LPC",           field: "lpc",                  width: 130, formatter: fmtDatetime},
                {title: "DOC",           field: "doc",                  width: 130, formatter: fmtDatetime},
                {title: "NOR",           field: "nor",                  width: 130, formatter: fmtDatetime},
                {title: "Berth",         field: "berth_name",           widthGrow: 1},
                {title: "Status",        field: "doc_status",           width: 110, headerFilter: "input"},
                {title: "Action",        formatter: actionFormatter,    width: 170, headerSort: false}
            ],
            pagination: true,
            paginationMode: "remote",
            paginationSize: 20,
            ajaxURL: "/api/module/EV01/data",
            ajaxResponse: function(url, params, response) {
                document.getElementById('rowCount').textContent = response.data.length;
                document.getElementById('totalCount').textContent = response.total;
                return response;
            },
            selectable: true
        });
        if (localStorage.getItem('theme') === 'dark') {
            document.getElementById('table').classList.add('tabulator-dark');
        }
    }

    function openAddModal() {
        document.getElementById('modalTitle').textContent = 'Add Expected Vessel';
        document.getElementById('evForm').reset();
        document.getElementById('fId').value = '';
        document.getElementById('evModal').style.display = 'block';
    }

    function closeModal() {
        document.getElementById('evModal').style.display = 'none';
    }

    async function editRow(id) {
        const res = await fetch(`/api/module/EV01/data?page=1&size=9999`);
        const json = await res.json();
        const row = json.data.find(r => r.id === id);
        if (!row) return;
        document.getElementById('modalTitle').textContent = 'Edit Expected Vessel';
        document.getElementById('fId').value = row.id || '';
        document.getElementById('fTerminal').value  = row.terminal_name || '';
        document.getElementById('fVesselName').value = row.vessel_name || '';
        document.getElementById('fViaNumber').value = row.via_number || '';
        document.getElementById('fLoa').value       = row.loa || '';
        document.getElementById('fDraft').value     = row.draft || '';
        document.getElementById('fAgent').value     = row.agent_tank_consignee || '';
        document.getElementById('fCargo').value     = row.cargo_name || '';
        document.getElementById('fMla').value       = row.mla || '';
        document.getElementById('fQty').value       = row.quantity || '';
        document.getElementById('fDdp').value       = row.ddp ? row.ddp.substring(0,10) : '';
        document.getElementById('fDop').value       = row.dop ? row.dop.substring(0,10) : '';
        document.getElementById('fEta').value       = row.eta ? row.eta.substring(0,16) : '';
        document.getElementById('fAta').value       = row.ata ? row.ata.substring(0,16) : '';
        document.getElementById('fLpc').value       = row.lpc ? row.lpc.substring(0,16) : '';
        document.getElementById('fDoc').value       = row.doc ? row.doc.substring(0,16) : '';
        document.getElementById('fNor').value       = row.nor ? row.nor.substring(0,16) : '';
        document.getElementById('fBerth').value     = row.berth_name || '';
        document.getElementById('evModal').style.display = 'block';
    }

    async function submitForm(e) {
        e.preventDefault();
        const form = document.getElementById('evForm');
        const fd = new FormData(form);
        const data = {};
        fd.forEach((v, k) => { data[k] = v.trim() === '' ? null : v.trim(); });
        if (!data.id) delete data.id;
        const res = await fetch('/api/module/EV01/save', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(data)
        });
        const result = await res.json();
        if (result.error) { alert('Error: ' + result.error); return; }
        closeModal();
        table.setData('/api/module/EV01/data');
    }

    function deleteSelected() {
        const selected = table.getSelectedRows();
        if (selected.length === 0) { alert('Select rows to delete'); return; }
        if (!confirm(`Delete ${selected.length} row(s)?`)) return;
        selected.forEach(async row => {
            const id = row.getData().id;
            if (id) {
                await fetch('/api/module/EV01/delete', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({id: id})
                });
            }
            row.delete();
        });
    }

    async function moveToVcn(evId) {
        if (!confirm('Move this vessel to VCN? A new VCN Draft will be created.')) return;
        const res = await fetch(`/api/module/EV01/move_to_vcn/${evId}`, {method: 'POST'});
        const result = await res.json();
        if (result.error) { alert('Error: ' + result.error); return; }
        alert(`Moved to VCN successfully!\nVCN Document No: ${result.vcn_doc_num}`);
        table.setData('/api/module/EV01/data');
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape') closeModal();
    });

    initTable();
</script>
{% endblock %}
